<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags & SEO Stuff -->
    <title>FIELD OS 🌾 | Indian Farmer Dashboard</title>
    <meta name="title" content="FIELD OS 🌾 | Indian Farmer Dashboard" />
    <meta name="description"
        content="Comprehensive dashboard for Indian farmers — manage implements, calculate subsidies, access custom hiring, buy/sell equipment, and get real-time weather & market data." />
    <meta name="keywords"
        content="Indian agriculture, farmer dashboard, subsidy calculator, SMAM, custom hiring, tractor subsidy, implement management, MSP prices, IMD weather, Agri-tech India" />
    <meta name="author" content="Government of India Initiative" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://field-os-dashboard.example.com/" />
    <meta property="og:title" content="FIELD OS 🌾 | Indian Farmer Dashboard" />
    <meta property="og:description"
        content="Comprehensive dashboard for Indian farmers — manage implements, calculate subsidies, access custom hiring, buy/sell equipment, and get real-time weather & market data." />
    <meta property="og:image" content="https://field-os-dashboard.example.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://field-os-dashboard.example.com/" />
    <meta property="twitter:title" content="FIELD OS 🌾 | Indian Farmer Dashboard" />
    <meta property="twitter:description"
        content="Comprehensive dashboard for Indian farmers — manage implements, calculate subsidies, access custom hiring, buy/sell equipment, and get real-time weather & market data." />
    <meta property="twitter:image" content="https://field-os-dashboard.example.com/og-image.jpg" />

    <!-- Webmaster Verification Placeholders -->
    <meta name="google-site-verification" content="google-site-verification-placeholder-code" />
    <meta name="msvalidate.01" content="bing-site-verification-placeholder-code" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div id="app">
        <!-- Animated Background Orbs -->
        <div class="bg-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="/logo.png" alt="FIELD OS Logo" class="logo-icon"
                        style="width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.4)); border-radius: 8px;">
                    <div class="logo-text">
                        <h1>FIELD OS</h1>
                        <span class="logo-subtitle">Smart Farm System</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebarNav"></nav>

            <div class="sidebar-footer">
                <div class="gov-badge" id="govBadgeContainer">
                    <span>🏛️</span>
                    <span id="govBadgeText">Govt. of India Initiative</span>
                </div>
                <div class="user-card" id="userCard">
                    <div class="user-avatar">👨‍🌾</div>
                    <div class="user-info">
                        <span class="user-name">Rajesh Kumar</span>
                        <span class="user-role">Block Development Officer</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Area -->
        <div class="main-wrapper">
            <!-- Top Bar -->
            <header class="topbar" id="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
                        <span></span><span></span><span></span>
                    </button>
                    <div class="breadcrumb" id="breadcrumb">
                        <span class="breadcrumb-icon">📊</span>
                        <span class="breadcrumb-text">Dashboard</span>
                    </div>
                </div>
                <div class="topbar-center">
                    <div class="search-box" id="searchBox">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Search implements, schemes, services..." id="globalSearch"
                            autocomplete="off" />
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="topbar-btn wallet-btn" id="walletBtn" title="Fuel Subsidy Wallet">
                        <span style="font-size: 18px;">💳</span>
                    </button>
                    <button class="topbar-btn notification-btn" id="notifBtn" title="Notifications">
                        🔔 <span class="notif-badge">3</span>
                    </button>
                    <select class="lang-select" id="langSwitch" title="Language">
                        <option value="en">ENG</option>
                        <option value="hi">हिन्दी</option>
                        <option value="ta">தமிழ்</option>
                        <option value="te">తెలుగు</option>
                        <option value="kn">ಕನ್ನಡ</option>
                    </select>
                    <button class="topbar-btn theme-btn" id="themeToggle" title="Toggle Theme">🌙</button>
                </div>
            </header>

            <!-- Main Content -->
            <main class="content" id="mainContent">
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Notification Panel -->
    <div class="notification-panel" id="notifPanel">
        <div class="notif-header">
            <h3>Notifications</h3>
            <button class="notif-close" id="notifClose">✕</button>
        </div>
        <div class="notif-list" id="notifList"></div>
    </div>

    <!-- Fuel Subsidy Wallet Panel -->
    <div class="wallet-panel" id="walletPanel">
        <div class="wallet-header">
            <h3>💳 Fuel Subsidy Wallet</h3>
            <button class="wallet-close" id="walletClose">✕</button>
        </div>
        <div class="wallet-body" id="walletBody">
            <!-- Wallet content injected here -->
        </div>
    </div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header" id="modalHeader"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/src/app.js"></script>
</body>

</html>
